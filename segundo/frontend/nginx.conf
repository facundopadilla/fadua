# Production nginx: serves the SPA and reverse-proxies /api/ to the backend.
#
# Path mapping (verified against the frontend hooks):
#   The SPA is built with VITE_API_URL=/api, so the React hooks fetch:
#     `${API_URL}/chat`   -> /api/chat
#     `${API_URL}/health` -> /api/health
#     `${API_URL}/models` -> /api/models
#   The `location /api/` block below proxies to `http://api:8000/` (note the
#   TRAILING SLASH on proxy_pass): nginx strips the `/api` prefix, so the
#   backend actually receives:
#     /api/chat   -> /chat
#     /api/health -> /health
#     /api/models -> /models
#   which are exactly the FastAPI routes (all mounted with NO router prefix).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets (not the SSE stream — that is proxied below).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA client-side routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the API. Trailing slash on proxy_pass strips the /api prefix.
    location /api/ {
        proxy_pass http://api:8000/;

        # --- Critical for Server-Sent Events (POST /chat, text/event-stream) ---
        # deepseek responses can take 60s+, so do NOT buffer, cache, or close early.
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Standard proxy headers.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
